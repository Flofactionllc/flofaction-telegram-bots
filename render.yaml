# Render deployment configuration for Flo Faction Telegram Bot Handler v2.0
# Deploys 20 Telegram bots with AI/LLM integration

services:
  - type: web
    name: flofaction-bots
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # LLM Configuration
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      # Bot tokens - 20 bots
      - key: CLAUDETTE_TOKEN
        sync: false
      - key: QUANTUM_CLAW_TOKEN
        sync: false
      - key: ZERO_CLAW_TOKEN
        sync: false
      - key: GIGA_CLAW_TOKEN
        sync: false
      - key: FLOFACTION_GRANT_TOKEN
        sync: false
      - key: TERRA_CLAW_TOKEN
        sync: false
      - key: FLOFACTION_HACKATHON_TOKEN
        sync: false
      - key: ULTRA_CLAW_TOKEN
        sync: false
      - key: ALPHA_CLAW_TOKEN
        sync: false
      - key: NINJA_CLAW_TOKEN
        sync: false
      - key: NEMO_CLAW_TOKEN
        sync: false
      - key: DOJO_CLAW_TOKEN
        sync: false
      - key: MEGA_CLAW_TOKEN
        sync: false
      - key: OPEN_CLAW_TOKEN
        sync: false
      - key: NANO_CLAW_TOKEN
        sync: false
      - key: NANO_CLAW_IOS_TOKEN
        sync: false
      - key: MICRO_CLAW_TOKEN
        sync: false
      - key: OMEGA_CLAW_TOKEN
        sync: false
      - key: FLOFACTION_OPEN_CLAW_TOKEN
        sync: false
      - key: TAX_CLAW_TOKEN
        sync: false
      - key: LEX_CLAW_TOKEN
        sync: false
    
    healthCheckPath: /health
    autoDeploy: true
