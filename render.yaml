# Render deployment configuration for Flo Faction Telegram Bot Handler v4.0
# Deploys 20 Telegram bots with AI/LLM (SambaNova free tier - 100% free, 24/7)
services:
  - type: web
    name: flofaction-bots
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "3000"
      # BASE_URL - set this to your Render URL after first deploy
      # Example: https://flofaction-bots.onrender.com
      - key: BASE_URL
        sync: false
      # LLM Configuration (SambaNova free tier - verified working)
      - key: SAMBANOVA_API_KEY
        sync: false
      # Gmail SMTP
      - key: GMAIL_USER
        value: flofactionllc@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Admin User ID (your Telegram user ID for admin commands)
      - key: ADMIN_USER_ID
        sync: false
      # Bot tokens - 20 bots
      - key: CLAUDETTE_TOKEN
        sync: false
      - key: QUANTUM_CLAW_TOKEN
        sync: false
      - key: ZERO_CLAW_TOKEN
        sync: false
      - key: GIGA_CLAW_TOKEN
        sync: false
      - key: FLOFACTION_GRANT_TOKEN
        sync: false
      - key: TERRA_CLAW_TOKEN
        sync: false
      - key: FLOFACTION_HACKATHON_TOKEN
        sync: false
      - key: ULTRA_CLAW_TOKEN
        sync: false
      - key: ALPHA_CLAW_TOKEN
        sync: false
      - key: NINJA_CLAW_TOKEN
        sync: false
      - key: NEMO_CLAW_TOKEN
        sync: false
      - key: DOJO_CLAW_TOKEN
        sync: false
      - key: MEGA_CLAW_TOKEN
        sync: false
      - key: OPEN_CLAW_TOKEN
        sync: false
      - key: NANO_CLAW_TOKEN
        sync: false
      - key: NANO_CLAW_IOS_TOKEN
        sync: false
      - key: MICRO_CLAW_TOKEN
        sync: false
      - key: OMEGA_CLAW_TOKEN
        sync: false
      - key: TAX_CLAW_TOKEN
        sync: false
      - key: LEX_CLAW_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true
